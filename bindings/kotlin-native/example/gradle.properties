org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
kotlin.code.style=official
kotlin.native.ignoreDisabledTargets=true
# K/N 2.1+ ships a Default Hierarchy Template that pre-claims a
# `native` source-set name; our example pre-dates the template
# and uses the literal "native" target name, which would clash.
# Disabling the default template keeps the existing single-target
# layout simple — this example is a smoke test, not a real
# multiplatform module that benefits from hierarchy inheritance.
kotlin.mpp.applyDefaultHierarchyTemplate=false
